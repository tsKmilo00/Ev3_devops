name: CI/CD Pipeline to AWS ECS

on:
  push:
    branches:
      - main # O la rama principal que uses (ej. master)

env:
  AWS_REGION: us-east-1 # Región por defecto de AWS Academy
  ECS_CLUSTER: innovatech-cluster # El nombre de tu clúster creado
  # Cambia el nombre del servicio según corresponda:
  # innovatech-front-service / innovatech-back-despachos-service / innovatech-back-ventas-service
  ECS_SERVICE: innovatech-front-service 
  # Cambia la URI de ECR según corresponda al repositorio del proyecto:
  ECR_REPOSITORY: 123456789012.dkr.ecr.us-east-1.amazonaws.com/innovatech-front-despacho

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Construye la imagen Docker usando el Dockerfile optimizado
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REPOSITORY:latest
        
        # Sube ambas etiquetas (la versión única por commit y la 'latest')
        docker push $ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REPOSITORY:latest
        echo "image=$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # Este paso le indica a ECS que descargue la nueva imagen y reinicie las tareas automáticamente
    - name: Deploy to Amazon ECS
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment